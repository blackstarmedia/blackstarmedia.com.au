name: Update latest YouTube uploads

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:         # allow manual runs

permissions:
  contents: write

concurrency:
  group: latest-videos
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Refresh latest-videos.json
        run: python3 scripts/update_latest_videos.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain assets/data/latest-videos.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/data/latest-videos.json
            git commit -m "Update latest YouTube uploads"
            git push
          else
            echo "No change."
          fi
